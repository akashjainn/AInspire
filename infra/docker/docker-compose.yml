version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ainspire-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ainspire
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ainspire-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: ainspire-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ainspire-qdrant
    ports:
      - "6333:6333"

volumes:
  pg-data:
  minio-data:
